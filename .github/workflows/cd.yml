name: CD – Build & Deploy magento2-pagarme

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: magento2-pagarme
  IMAGE_TAG: php8

jobs:

  build-and-push:
    name: Build & push to ACR
    runs-on: ubuntu-latest
    outputs:
      full_tag: ${{ steps.tag.outputs.full_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set full image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "full_tag=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create auth.json from secrets
        run: |
          cat > auth.json <<EOF
          {
            "http-basic": {
              "repo.magento.com": {
                "username": "${{ secrets.MAGENTO_REPO_PUBLIC_KEY }}",
                "password": "${{ secrets.MAGENTO_REPO_PRIVATE_KEY }}"
              }
            }
          }
          EOF

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ steps.tag.outputs.full_tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to ACI
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set env-specific vars
        id: vars
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "rg=${{ secrets.ACI_RESOURCE_GROUP_PROD }}"         >> "$GITHUB_OUTPUT"
            echo "group=${{ secrets.ACI_CONTAINER_GROUP_PROD }}"     >> "$GITHUB_OUTPUT"
            echo "host=${{ secrets.MAGENTO_HOST_PROD }}"             >> "$GITHUB_OUTPUT"
          else
            echo "rg=${{ secrets.ACI_RESOURCE_GROUP_STAGING }}"      >> "$GITHUB_OUTPUT"
            echo "group=${{ secrets.ACI_CONTAINER_GROUP_STAGING }}"  >> "$GITHUB_OUTPUT"
            echo "host=${{ secrets.MAGENTO_HOST_STAGING }}"          >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Magento container to ACI
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ steps.vars.outputs.rg }}
          dns-name-label: ${{ steps.vars.outputs.group }}
          name: ${{ steps.vars.outputs.group }}
          image: ${{ needs.build-and-push.outputs.full_tag }}
          registry-login-server: ${{ env.ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.ACR_USERNAME }}
          registry-password: ${{ secrets.ACR_PASSWORD }}
          location: eastus
          ports: 80
          environment-variables: >
            MAGENTO_MODE=production
            ELASTICSEARCH_HOST=${{ secrets.ELASTICSEARCH_HOST }}
            ELASTICSEARCH_PORT_NUMBER=9200
            MAGENTO_DATABASE_HOST=${{ secrets.MAGENTO_DATABASE_HOST }}
            MAGENTO_DATABASE_NAME=${{ secrets.MAGENTO_DATABASE_NAME }}
            MAGENTO_DATABASE_USER=${{ secrets.MAGENTO_DATABASE_USER }}
            MAGENTO_DATABASE_PORT_NUMBER=3306
            MAGENTO_ENABLE_HTTPS=yes
            MAGENTO_ENABLE_ADMIN_HTTPS=yes
            MAGENTO_HOST=${{ steps.vars.outputs.host }}
            MAGENTO_ADMIN_URL=${{ secrets.MAGENTO_ADMIN_URL }}
            MAGENTO_ADMIN_EMAIL=${{ secrets.MAGENTO_ADMIN_EMAIL }}
          secure-environment-variables: >
            MAGENTO_DATABASE_PASSWORD=${{ secrets.MAGENTO_DATABASE_PASSWORD }}
            MAGENTO_ADMIN_USER=${{ secrets.MAGENTO_ADMIN_USER }}
            MAGENTO_ADMIN_PASSWORD=${{ secrets.MAGENTO_ADMIN_PASSWORD }}
          cpu: 2
          memory: 4

      - run: az logout
        if: always()
